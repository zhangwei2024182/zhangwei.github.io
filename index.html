    <h1>🛒 亚马逊价格监控工具</h1>
    <p>本项目使用亚马逊Product Advertising API，为用户提供商品价格追踪和对比服务。</p>
    
    <h2>📌 功能列表</h2>
    <ul>
        <li>实时获取商品价格和图片</li>
        <li>降价邮件提醒</li>
        <li>多商品比价</li>
        <li>历史价格走势</li>
    </ul>
    
    <h2>🔧 技术方案</h2>
    <ul>
        <li>Amazon Product Advertising API 5.0</li>
        <li>Python后端（Flask）</li>
        <li>前端：HTML/CSS/JavaScript</li>
    </ul>
    
    <h2>✅ 合规说明</h2>
    <p>本项目严格遵守亚马逊联盟政策，所有数据均通过官方API获取，并明确标注来源。</p>
